name: Deploy React App to Google Cloud

on:
  push:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd './frontend/'
        npm install

    - name: Build React application
      run: |
        cd './frontend/'
        REACT_APP_GOOGLE_MAPS_API_KEY=AIzaSyChQZr5AKEKtboy4fw0nfI-L3wO9jiYAOw REACT_APP_API=https://us-central1-base-map-workspace.cloudfunctions.net/regenquest-api REACT_APP_AUTH_URI=http://localhost:3002 REACT_APP_STORAGE_URL=https://storage.googleapis.com REACT_APP_JWT_COOKIE=phc npm run build

    - name: Authenticate with Google Cloud
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Deploy to Google App Engine
      run: |
        cd './frontend/'
        echo "${{ secrets.GCP_SA_KEY }}" > ./base-map-workspace-93c116fe8662.json
        gcloud app deploy
