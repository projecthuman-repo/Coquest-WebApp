name: Deploy Regenquest Web Service

on:
  push:
    paths:
      - 'Regenquest GraphQL API/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Authenticate with Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Install dependencies
        run: |
          cd 'Regenquest GraphQL API'
          npm install

      - name: Deploy to Google Cloud Functions
        run: |
          cd 'Regenquest GraphQL API'
          awk -F= '{ print $1 ": \"" $2 "\"" }' <(echo ${{ secrets.ENV_VARS }}) | sed '$ s/,$//' | sed '1s/^/{\n/' | sed '$s/$/\n}/' > .env
          echo "${{ secrets.GCP_SA_KEY }}" > ./base-map-workspace-93c116fe8662.json
          gcloud functions deploy regenquest-api \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point handler \
            --region us-central1 \
            --project base-map-workspace \
            --env-vars-file .env
