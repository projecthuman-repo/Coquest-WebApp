name: Deploy Regenquest Web Service

on:
  push:
    paths:
      - 'Regenquest GraphQL API/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Authenticate with Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Install dependencies
        run: |
          cd 'Regenquest GraphQL API'
          npm install

      - name: Deploy to Google Cloud Functions
        run: |
          cd 'Regenquest GraphQL API'
          awk -F= '{ print $1 ": \"" $2 "\"" }' <(echo ${{ secrets.ENV_VARS }}) > .env
          echo "${{ secrets.GCP_SA_KEY }}" > ./base-map-workspace-93c116fe8662.json
          gcloud functions deploy regenquest-api \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point handler \
            --region us-central1 \
            --project base-map-workspace \
            --set-env-vars NODE_ENV=production,DATABASE_CONNECTION='mongodb+srv://regenquest_db_admin:840nBbpzlOB2kRmh@phc-cluster.sxtfgeu.mongodb.net/regenquest?retryWrites=true&w=majority&appName=phc-cluster',REGENQUEST_DB_NAME=regenquest,CROSSPLATFORM_DB_NAME=CrossPlatform,IMAGE_BUCKET_NAME=us.artifacts.base-map-workspace.appspot.com,DIR_PATH=containers/images,GOOGLE_APPLICATION_CREDENTIALS='./base-map-workspace-93c116fe8662.json',AUTH_COOKIE_NAME=phc,ACCESS_JWT_NAME=jwt_secret,CROSS_ORIGIN=https://base-map-workspace.uc.r.appspot.com,REACT_APP_AUTH_API_URI=http://localhost:3001
