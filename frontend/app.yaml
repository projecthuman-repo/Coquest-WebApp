runtime: nodejs20

handlers:
  - url: /
    static_dir: build

  - url: /.*
    static_files: build/index.html
    upload: build/index.html
    http_headers:
      Content-Type: text/html; charset=utf-8

automatic_scaling:
  target_cpu_utilization: 0.65
  target_throughput_utilization: 0.75
  min_instances: 1

env_variables:
  GOOGLE_APPLICATION_CREDENTIALS: "/workspace/base-map-workspace-93c116fe8662.json"
  REACT_APP_AUTH_URI: "http://localhost:3002"
  REACT_APP_STORAGE_URL: "https://storage.googleapis.com"
  REACT_APP_JWT_COOKIE: "phc"
